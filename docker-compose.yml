version: '3.8'

services:
  # ==========================================
  # MVP SERVICES
  # ==========================================
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: proflow-app
    container_name: proflow_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - proflow_network
    depends_on:
      - mysql

  nginx:
    image: nginx:1.30-alpine
    container_name: proflow_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - proflow_network
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: proflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - proflow_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - proflow_network

