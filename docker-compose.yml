x-app-build: &app-build
  context: ./backend
  dockerfile: docker/php/Dockerfile

services:
  # ==========================================
  # MVP SERVICES
  # ==========================================
  app:
    build: *app-build
    image: proflow-app
    container_name: proflow_app
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "
      if [ ! -d vendor ]; then composer install --ignore-platform-reqs; fi &&
      if [ ! -f .env ]; then cp .env.example .env && php artisan key:generate; fi &&
      php artisan migrate --force &&
      php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000
      "
    volumes:
      - ./backend:/var/www
    networks:
      - proflow_network
    depends_on:
      - mysql

  nginx:
    image: nginx:1.30-alpine
    container_name: proflow_nginx
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - proflow_network
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: proflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-proflow}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-proflow}
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - proflow_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - proflow_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: proflow_phpmyadmin
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    networks:
      - proflow_network
    depends_on:
      - mysql

  # ==========================================
  # 🔮 ENHANCED PHASE SERVICES (Commented out)
  # ==========================================

  redis:
    image: redis:7-alpine
    container_name: proflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - proflow_redis_data:/data
    networks:
      - proflow_network

  reverb:
    build: *app-build
    image: proflow-app
    container_name: proflow_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www
    networks:
      - proflow_network
    depends_on:
      - app
      - redis

  queue:
    build: *app-build
    image: proflow-app
    container_name: proflow_queue
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - ./backend:/var/www
    networks:
      - proflow_network
    depends_on:
      - app
      - redis
      - mysql

  # scheduler:
  #   image: proflow-app
  #   container_name: proflow_scheduler
  #   restart: unless-stopped
  #   command: php artisan schedule:work
  #   volumes:
  #     - ./backend:/var/www
  #   networks:
  #     - proflow_network
  #   depends_on:
  #     - app
  #     - redis
  #     - mysql

  # ==========================================
  # FRONTEND SERVICE
  # ==========================================
  frontend:
    image: node:20-alpine
    container_name: proflow_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    networks:
      - proflow_network

networks:
  proflow_network:
    driver: bridge

volumes:
  proflow_mysql_data:
  proflow_redis_data:
